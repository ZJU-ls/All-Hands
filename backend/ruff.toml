line-length = 100
target-version = "py311"
extend-exclude = ["alembic/versions"]

[lint]
select = [
    "E", "F", "W",     # pycodestyle + pyflakes
    "I",               # isort
    "N",               # pep8-naming
    "B",               # flake8-bugbear
    "UP",              # pyupgrade
    "SIM",             # flake8-simplify
    "RUF",             # ruff-specific
    "ASYNC",           # flake8-async
    "C4",              # flake8-comprehensions
    "PIE",
    "PTH",             # use pathlib
    "RET",             # returns
    "TCH",             # type-checking
]
ignore = [
    "E501",   # line length handled by formatter
    "B008",   # FastAPI Depends() defaults
    "N818",   # domain exceptions don't need Error suffix (DDD convention)
    "TC003",  # stdlib datetime used at runtime by Pydantic validators
    "TC001",  # same for first-party imports used by Pydantic
]

[lint.per-file-ignores]
"tests/**" = ["N", "B", "SIM117", "ASYNC240"]

[format]
quote-style = "double"
indent-style = "space"
