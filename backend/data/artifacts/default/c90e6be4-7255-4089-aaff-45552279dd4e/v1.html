<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>制品区能力测试员 - 能力图谱</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #475569;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --accent-research: #3b82f6;
            --accent-write: #10b981;
            --accent-draw: #f59e0b;
            --accent-manage: #8b5cf6;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--secondary);
            margin: 0;
            padding: 40px;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        h1 {
            color: #1e293b;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #64748b;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            border-top: 4px solid transparent;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .card.research { border-color: var(--accent-research); }
        .card.write { border-color: var(--accent-write); }
        .card.draw { border-color: var(--accent-draw); }
        .card.manage { border-color: var(--accent-manage); }

        .icon {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 15px;
            color: white;
        }
        .research .icon { background: var(--accent-research); }
        .write .icon { background: var(--accent-write); }
        .draw .icon { background: var(--accent-draw); }
        .manage .icon { background: var(--accent-manage); }

        h3 { margin: 0 0 10px 0; color: #1e293b; }
        p { font-size: 0.9rem; margin: 0; }
        
        .workflow-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .step-list {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .step-item {
            flex: 1;
            min-width: 180px;
            position: relative;
        }
        .step-num {
            display: inline-block;
            width: 30px;
            height: 30px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            margin-right: 10px;
        }
        .principles {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .tag {
            background: #e2e8f0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>制品区能力测试员</h1>
        <div class="subtitle">多模态资产质量管控与标准化输出专家</div>
    </header>

    <div class="grid">
        <div class="card research">
            <div class="icon">🔍</div>
            <h3>需求调研</h3>
            <p>通过 web_research 抓取最新标准，确保信息时效性与准确性。</p>
        </div>
        <div class="card write">
            <div class="icon">📝</div>
            <h3>内容构建</h3>
            <p>利用 file_writing 撰写结构化文档，进行多模态数据的存取迭代。</p>
        </div>
        <div class="card draw">
            <div class="icon">🎨</div>
            <h3>可视化制图</h3>
            <p>调用 drawio 助手生成符合规范的 mxfile XML，完美渲染架构图。</p>
        </div>
        <div class="card manage">
            <div class="icon">📦</div>
            <h3>整合交付</h3>
            <p>统一管理制品区资产，形成完整的测试闭环并输出最终结论。</p>
        </div>
    </div>

    <div class="workflow-section">
        <h3 style="margin-bottom: 20px;">标准化工作流</h3>
        <ul class="step-list">
            <li class="step-item"><span class="step-num">1</span>接收测试/制图需求</li>
            <li class="step-item"><span class="step-num">2</span>构建内容与验证逻辑</li>
            <li class="step-item"><span class="step-num">3</span>生成可视化图表</li>
            <li class="step-item"><span class="step-num">4</span>归档至制品区</li>
        </ul>
    </div>

    <div class="principles">
        <div class="tag">必须标准化</div>
        <div class="tag">绝不臆造</div>
        <div class="tag">主动归档</div>
    </div>
</div>

</body>
</html>
