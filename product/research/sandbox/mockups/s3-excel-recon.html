<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>S3 mockup · Excel 对账</title>
<style>
  :root { --bg: #0b1020; --bg-elev: #131a32; --bg-card: #161e3a; --bg-card-2: #1c2547;
    --border: #232c52; --border-soft: #1d2647; --text: #e7ecff; --text-muted: #9aa6d3; --text-dim: #6c7aa8;
    --primary: #4f7dff; --primary-soft: #6e94ff; --accent: #8ab4ff;
    --good: #3ec28f; --warn: #f0b94f; --bad: #ef6f6c; --code-bg: #0e1530; }
  html[data-theme="light"] { --bg: #f6f8ff; --bg-elev: #ffffff; --bg-card: #ffffff; --bg-card-2: #f0f4ff;
    --border: #dbe2f5; --text: #15203d; --text-muted: #5a6691;
    --primary: #2a59e6; --primary-soft: #4f7dff; --accent: #2a59e6; --code-bg: #eef2ff; }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text); margin: 0; }
  body { font: 14.5px/1.6 -apple-system, "PingFang SC", sans-serif; min-height: 100vh; }

  .top { height: 52px; background: var(--bg-elev); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 16px; }
  .top a { color: var(--primary-soft); text-decoration: none; font-size: 12.5px; }
  .top .title { font-weight: 700; }
  .top .badge { padding: 3px 10px; background: rgba(240,185,79,0.13); color: var(--warn); border: 1px solid rgba(240,185,79,0.3); border-radius: 999px; font-size: 11px; font-weight: 600; }
  .top .spacer { flex: 1; }
  .top button { background: var(--primary); color: white; border: 0; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; }

  .layout { display: grid; grid-template-columns: 1fr 480px; height: calc(100vh - 52px); }
  .chat { display: flex; flex-direction: column; }
  .stream { flex: 1; overflow-y: auto; padding: 20px 28px; }
  .msg { margin: 14px 0; display: flex; gap: 12px; opacity: 0; transform: translateY(6px); transition: all 0.4s; }
  .msg.show { opacity: 1; transform: translateY(0); }
  .avatar { width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; }
  .avatar.user { background: linear-gradient(135deg, #4f7dff, #6e94ff); }
  .avatar.agent { background: linear-gradient(135deg, #3ec28f, #6dd5a8); }
  .avatar.system { background: linear-gradient(135deg, #6c7aa8, #9aa6d3); }
  .body { flex: 1; min-width: 0; }
  .who { font-size: 11px; color: var(--text-dim); margin-bottom: 3px; font-weight: 600; }
  .bubble { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; font-size: 14px; }
  .bubble.user { background: linear-gradient(135deg, rgba(79,125,255,0.10), rgba(138,180,255,0.04)); border-color: rgba(79,125,255,0.25); }
  .bubble.system { background: var(--bg-card-2); font-size: 12.5px; color: var(--text-muted); }
  .bubble.skill { background: linear-gradient(135deg, rgba(138,92,246,0.10), rgba(167,139,250,0.04)); border-color: rgba(138,92,246,0.25); font-size: 12.5px; }
  .bubble.skill::before { content: "🎯 Skill activated · excel-ops"; display: block; color: #c4a9fe; font-size: 11px; font-weight: 700; margin-bottom: 4px; }

  .tool-call { background: var(--bg-card-2); border: 1px solid var(--border-soft); border-radius: 10px; padding: 10px 14px; margin: 6px 0; font-size: 12.5px; }
  .tool-call .head { display: flex; gap: 8px; color: var(--accent); font-family: ui-monospace, monospace; font-weight: 600; }
  .tool-call .head .scope { margin-left: auto; padding: 1px 7px; border-radius: 999px; font-size: 10px; font-weight: 600; background: rgba(239,111,108,0.13); color: var(--bad); border: 1px solid rgba(239,111,108,0.3); }
  .tool-call .head .scope.read { background: rgba(62,194,143,0.13); color: var(--good); border-color: rgba(62,194,143,0.3); }
  .tool-call .args { margin-top: 6px; color: var(--text); font-family: ui-monospace, monospace; font-size: 11.5px; background: var(--code-bg); padding: 8px 10px; border-radius: 6px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
  .tool-call .result { margin-top: 6px; padding: 6px 10px; background: var(--bg-elev); border-left: 2px solid var(--good); border-radius: 0 6px 6px 0; font-size: 12px; }
  .tool-call .result.warn { border-left-color: var(--warn); color: var(--warn); font-style: italic; }

  .thinking { color: var(--text-dim); font-style: italic; padding: 8px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; display: inline-block; font-size: 13px; }
  .thinking::after { content: '...'; animation: dots 1.2s infinite; }
  @keyframes dots { 0%,20%{content:'.';}40%{content:'..';}60%,100%{content:'...';} }

  .composer { border-top: 1px solid var(--border); background: var(--bg-elev); padding: 14px 28px; }
  .composer .row { display: flex; gap: 10px; }
  .composer input { flex: 1; padding: 11px 14px; background: var(--bg-card); color: var(--text); border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; }
  .composer .send { background: linear-gradient(135deg, var(--primary), var(--primary-soft)); color: white; border: 0; padding: 11px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .composer .send:disabled { opacity: 0.5; cursor: not-allowed; }
  .composer .hint { margin-top: 6px; font-size: 11.5px; color: var(--text-dim); }

  .side { background: var(--bg-elev); border-left: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; }
  .side h4 { margin: 14px 18px 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); font-weight: 700; }
  .pad { padding: 0 18px; }
  .files { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 18px; }
  .file-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 12px; }
  .file-card .icon { font-size: 22px; margin-bottom: 4px; }
  .file-card .name { font-family: ui-monospace, monospace; font-size: 11.5px; color: var(--accent); }
  .file-card .meta { color: var(--text-dim); font-size: 10.5px; margin-top: 2px; }

  table { width: calc(100% - 36px); margin: 10px 18px; border-collapse: collapse; font-size: 12px; background: var(--bg-card); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  th, td { padding: 7px 10px; text-align: left; border-bottom: 1px solid var(--border-soft); }
  th { background: var(--bg-card-2); color: var(--text-muted); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  td.num { font-variant-numeric: tabular-nums; text-align: right; font-family: ui-monospace, monospace; }
  td.up { color: var(--bad); font-weight: 600; }
  td.down { color: var(--good); font-weight: 600; }
  tr:last-child td { border-bottom: 0; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(6px); }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; min-width: 460px; max-width: 600px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); animation: pop 0.2s; }
  @keyframes pop { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal h3 { margin: 0 0 8px; font-size: 17px; }
  .scope-tag { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; background: rgba(239,111,108,0.13); color: var(--bad); border: 1px solid rgba(239,111,108,0.3); margin-left: 6px; }
  .modal .desc { color: var(--text-muted); font-size: 13px; margin: 8px 0 12px; }
  .modal .preview { background: var(--code-bg); border: 1px solid var(--border-soft); border-radius: 8px; padding: 10px 14px; margin: 12px 0; font-family: ui-monospace, monospace; font-size: 11.5px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; color: var(--accent); }
  .modal .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .modal .actions button { flex: 1; min-width: 130px; padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--bg-elev); color: var(--text); }
  .modal .actions button:hover { border-color: var(--primary); transform: translateY(-1px); }
  .modal .actions button.primary { background: linear-gradient(135deg, var(--primary), var(--primary-soft)); color: white; border-color: transparent; }
  .modal .actions button.deny { background: transparent; color: var(--text-muted); }

  .replay-banner { display: none; padding: 8px 16px; background: rgba(79,125,255,0.10); border-bottom: 1px solid rgba(79,125,255,0.25); text-align: center; font-size: 12.5px; color: var(--primary-soft); font-weight: 600; }
  .replay-banner.show { display: block; }

  @media (max-width: 920px) { .layout { grid-template-columns: 1fr; } .side { display: none; } }
</style>
</head>
<body>

<div class="top">
  <a href="../ACCEPTANCE.html">← 验收手册</a>
  <div class="title">S3 · Excel 对账</div>
  <div class="badge">Mockup · skill + run_python 演示</div>
  <div class="spacer"></div>
  <button onclick="startDemo()">▶ 重播</button>
</div>

<div class="replay-banner" id="banner">演示中</div>

<div class="layout">
  <div class="chat">
    <div class="stream" id="stream">
      <div class="msg show"><div class="avatar system">i</div><div class="body"><div class="who">系统</div><div class="bubble system">这个 mockup 演示 excel-ops skill 全流程:用户问 → skill 注入 → read 探查 → run_python 算 → 输出表格。<br>右栏:文件列表 + 最终对账结果表。</div></div></div>
    </div>
    <div class="composer">
      <div class="row">
        <input id="input" placeholder="试着输入 'sales 对账' 或 '比较 q1 q2'..." />
        <button class="send" onclick="sendUser()" id="sendBtn">发送</button>
      </div>
      <div class="hint">演示话术:对比两个 sheet 找差异</div>
    </div>
  </div>

  <div class="side">
    <h4>📁 演示数据</h4>
    <div class="files">
      <div class="file-card"><div class="icon">📊</div><div class="name">sales-Q1.xlsx</div><div class="meta">8 客户 · 15 KB</div></div>
      <div class="file-card"><div class="icon">📊</div><div class="name">sales-Q2.xlsx</div><div class="meta">8 客户 · 16 KB</div></div>
    </div>

    <h4 style="margin-top: 22px;">📈 对账结果</h4>
    <div id="result-area" style="padding: 0 18px; color: var(--text-dim); font-size: 12px; font-style: italic;">演示完成后填充...</div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="m-title">运行 Python <span class="scope-tag" id="m-scope">IRREVERSIBLE</span></h3>
    <div class="desc" id="m-desc"></div>
    <div class="preview" id="m-preview"></div>
    <div class="actions">
      <button class="primary" onclick="modalChoice('once')">允许这一次</button>
      <button onclick="modalChoice('always')">总是允许 run_python</button>
      <button class="deny" onclick="modalChoice('deny')">拒绝</button>
    </div>
  </div>
</div>

<script>
  const stream = document.getElementById('stream');
  const modal = document.getElementById('modal');
  const banner = document.getElementById('banner');
  const sendBtn = document.getElementById('sendBtn');

  function addMsg(who, html, cls = '') {
    const w = document.createElement('div');
    w.className = 'msg';
    const i = who === 'user' ? 'U' : (who === 'agent' ? 'A' : 'i');
    w.innerHTML = `<div class="avatar ${who}">${i}</div><div class="body"><div class="who">${who === 'user' ? '你' : (who === 'agent' ? 'Lead Agent' : '系统')}</div><div class="bubble ${cls}">${html}</div></div>`;
    stream.appendChild(w);
    requestAnimationFrame(() => w.classList.add('show'));
    stream.scrollTop = stream.scrollHeight;
    return w;
  }
  function addToolCall(name, args, scope) {
    const w = document.createElement('div');
    w.className = 'msg';
    const sc = scope === 'READ' ? 'read' : '';
    w.innerHTML = `<div class="avatar agent">A</div><div class="body"><div class="who">tool call</div><div class="tool-call"><div class="head"><span>🔧 ${name}</span><span class="scope ${sc}">${scope}</span></div><div class="args">${args}</div><div class="result warn">等待执行...</div></div></div>`;
    stream.appendChild(w);
    requestAnimationFrame(() => w.classList.add('show'));
    stream.scrollTop = stream.scrollHeight;
    return { result(html, cls = '') { const r = w.querySelector('.result'); r.className = 'result ' + cls; r.innerHTML = html; } };
  }
  function showModal({ title, scope, desc, preview }) {
    document.getElementById('m-title').firstChild.textContent = title + ' ';
    document.getElementById('m-scope').textContent = scope;
    document.getElementById('m-desc').innerHTML = desc;
    document.getElementById('m-preview').textContent = preview;
    modal.classList.add('show');
    return new Promise(r => { window._mr = r; });
  }
  function modalChoice(c) { modal.classList.remove('show'); if (window._mr) window._mr(c); }
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
  async function think(ms = 700) {
    const w = document.createElement('div');
    w.className = 'msg show';
    w.innerHTML = `<div class="avatar agent">A</div><div class="body"><div class="who">Lead Agent</div><div class="thinking">思考中</div></div>`;
    stream.appendChild(w);
    stream.scrollTop = stream.scrollHeight;
    await sleep(ms);
    w.remove();
  }

  function showResults() {
    document.getElementById('result-area').innerHTML = `
      <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; font-size: 12px; line-height: 1.7;">
        <strong style="color: var(--accent);">8 个客户 · 4 个变化超过 20% 阈值</strong>
      </div>
      <table>
        <tr><th>客户</th><th>Q1</th><th>Q2</th><th>变化</th></tr>
        <tr><td>张三</td><td class="num">12,500</td><td class="num">18,750</td><td class="num up">+50%</td></tr>
        <tr><td>李四</td><td class="num">8,000</td><td class="num">5,400</td><td class="num down">-32.5%</td></tr>
        <tr><td>王五</td><td class="num">22,000</td><td class="num">29,700</td><td class="num up">+35%</td></tr>
        <tr><td>陈七</td><td class="num">15,000</td><td class="num">11,250</td><td class="num down">-25%</td></tr>
      </table>
      <div style="padding: 0 18px; color: var(--text-dim); font-size: 11px; margin-top: 8px;">说明:|变化率| &gt; 20% · 排序按绝对值降序</div>
    `;
  }

  async function startDemo() {
    stream.innerHTML = '';
    document.getElementById('result-area').innerHTML = '<span style="color: var(--text-dim); font-style: italic;">演示完成后填充...</span>';
    banner.classList.add('show');
    sendBtn.disabled = true;

    await sleep(400);
    addMsg('user', '对比 ~/allhands-test/excel-demo 里的 sales-Q1.xlsx 和 sales-Q2.xlsx · 找出客户名相同但金额变化超过 20% 的客户', 'user');

    await sleep(600);
    await think(800);
    addMsg('agent', '好 · 我先看看两个文件的结构。');
    addMsg('agent', '激活 excel-ops skill', 'skill');

    await sleep(400);
    const tc1 = addToolCall('local.read', '{"path": "sales-Q1.xlsx", "limit": 50}', 'READ');
    await sleep(400);
    tc1.result('<code>客户,金额\\n张三,12500\\n李四,8000\\n王五,22000\\n...(8 行)</code>');

    await sleep(400);
    const tc2 = addToolCall('local.read', '{"path": "sales-Q2.xlsx", "limit": 50}', 'READ');
    await sleep(400);
    tc2.result('<code>客户,金额\\n张三,18750\\n李四,5400\\n王五,29700\\n...(8 行)</code>');

    await sleep(600);
    addMsg('agent', '结构一样 · 两列(客户 / 金额) · 8 个客户。<br>我用 openpyxl 读两个 sheet · join 后算变化率 · filter |变化率| &gt; 20%。');

    const code = `import openpyxl
def read_sheet(p):
    wb = openpyxl.load_workbook(p, read_only=True)
    ws = wb.active
    return {row[0].value: row[1].value
            for row in ws.iter_rows(min_row=2)
            if row[0].value}

q1 = read_sheet("sales-Q1.xlsx")
q2 = read_sheet("sales-Q2.xlsx")

results = []
for name in set(q1) & set(q2):
    a, b = q1[name], q2[name]
    pct = (b - a) / a * 100
    if abs(pct) > 20:
        results.append((name, a, b, pct))

results.sort(key=lambda r: -abs(r[3]))
for r in results:
    print(f"{r[0]}\\t{r[1]}\\t{r[2]}\\t{r[3]:+.1f}%")`;

    await sleep(400);
    const tc3 = addToolCall('local.run_python', `{"code": "<i>(58 行 openpyxl 脚本)</i>", "timeout": 30}`, 'IRREVERSIBLE');
    await sleep(300);

    const c = await showModal({
      title: 'Lead Agent 想跑 Python',
      scope: 'IRREVERSIBLE',
      desc: '只读模式 · 不修改文件 · 用 ~/.allhands/venv 标准库 · 30s timeout。',
      preview: code,
    });
    if (c === 'deny') {
      tc3.result('DENIED', 'warn');
      sendBtn.disabled = false; banner.classList.remove('show'); return;
    }
    await sleep(500);
    tc3.result(`<pre style="margin:0; font-size: 11px; line-height: 1.5;">客户   Q1     Q2     变化
张三   12500  18750  +50.0%
李四   8000   5400   -32.5%
王五   22000  29700  +35.0%
陈七   15000  11250  -25.0%
exit 0  ·  4 rows</pre>`);

    await sleep(700);
    addMsg('agent', `<strong>对账结果(共 4 个客户超阈值):</strong><br><br>
📈 <strong>涨幅 TOP:</strong><br>
&nbsp;&nbsp;• 张三 +50%(12.5K → 18.75K)· 涨幅最大<br>
&nbsp;&nbsp;• 王五 +35%(22K → 29.7K)<br><br>
📉 <strong>跌幅 TOP:</strong><br>
&nbsp;&nbsp;• 李四 -32.5%(8K → 5.4K)· 跌幅最大 · 建议跟进<br>
&nbsp;&nbsp;• 陈七 -25%(15K → 11.25K)<br><br>
其余 4 个客户金额变化都在 ±20% 以内 · 平稳。<br><br>
要不要把<strong>这次的方法封成 skill</strong>?下次说"跑 monthly-rec"直接复用,不用再引导。`);

    showResults();
    await sleep(400);
    addMsg('system', '🎯 验收要点:<br>1. 看到 excel-ops skill 激活提示<br>2. agent 用 local.run_python 跑 openpyxl,不是自造 parser<br>3. Python 跑前弹了 confirmation,显示完整代码<br>4. 输出是 markdown 表格 · 数字算对(50% / -32.5% 等)<br>5. agent 主动建议封 skill(连接 S10)', 'system');

    sendBtn.disabled = false;
    banner.classList.remove('show');
  }

  function sendUser() {
    const v = document.getElementById('input').value.trim();
    if (!v) return;
    document.getElementById('input').value = '';
    if (v.includes('对账') || v.includes('q1') || v.includes('Q1') || v.includes('比较') || v.includes('差异')) {
      startDemo();
    } else {
      addMsg('user', v, 'user');
      setTimeout(() => addMsg('agent', '试 "sales 对账" · 触发预设演示。'), 500);
    }
  }
  document.getElementById('input').addEventListener('keydown', e => { if (e.key === 'Enter') sendUser(); });
  setTimeout(startDemo, 800);
</script>
</body>
</html>
