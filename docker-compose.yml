# allhands — one-command self-deploy.
# Services: backend (FastAPI), web (Next.js), langfuse (observability stack).
#
# Data:
#   - SQLite DB + LangGraph checkpoint DB live under ./data (bind-mounted).
#   - LangFuse uses its own managed Postgres via `langfuse-db`.
#
# Defaults are dev-friendly. For prod, set ALLHANDS_* env vars + strong secrets.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: allhands-backend:dev
    environment:
      ALLHANDS_ENV: ${ALLHANDS_ENV:-dev}
      ALLHANDS_DATABASE_URL: sqlite+aiosqlite:////app/data/allhands.db
      ALLHANDS_CHECKPOINT_DB_PATH: /app/data/checkpoints.db
      ALLHANDS_LANGFUSE_HOST: http://langfuse:3000
      ALLHANDS_LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      ALLHANDS_LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      ALLHANDS_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ALLHANDS_OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ALLHANDS_DEFAULT_MODEL_REF: ${DEFAULT_MODEL_REF:-openai/gpt-4o-mini}
      ALLHANDS_CORS_ALLOW_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      - langfuse
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: allhands-web:dev
    environment:
      BACKEND_ORIGIN: http://backend:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend

  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      - langfuse-db
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-change-me-dev-secret}
      SALT: ${LANGFUSE_SALT:-change-me-dev-salt}
      TELEMETRY_ENABLED: "false"
    ports:
      - "3001:3000"

volumes:
  langfuse-db-data:
